name: Keszlet Szinkron

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scraper.py
      - run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add keszlet.csv
          git diff --staged --quiet || git commit -m "Keszlet frissites: $(date '+%Y-%m-%d %H:%M')"
          git push
